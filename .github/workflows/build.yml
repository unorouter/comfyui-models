name: Build baked-models image (self-hosted)

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Push image to registries + tag :latest / :sdxl (RunPod workers will roll). Default false = build + cache only."
        type: boolean
        default: false
  push:
    branches: [main]

concurrency:
  group: build-self-hosted-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    # Self-hosted runner on don server (701 GB disk). GitHub-hosted runners
    # only have 14 GB which is too small for the 34 GB Flux 2 unet layer.
    runs-on: self-hosted

    # Two variants, both from the same Dockerfile:
    # - full: SDXL + Flux 2 stack (~90 GB, tag :latest)
    # - sdxl: SDXL only, no Flux 2 (~40 GB, tag :sdxl)
    # Common bake stage is shared so the 39 GB of SDXL/ControlNet/LoRA/
    # YOLO layers are downloaded + pushed once and referenced by both tags
    # via content-addressable layer dedup on Docker Hub.
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: full
            tag: latest
          - variant: sdxl
            tag: sdxl

    env:
      # Push only when explicitly requested via workflow_dispatch input.
      # Every push image bump rolls RunPod workers, which is billed by
      # uptime, so default to cache-only builds and gate image publish
      # behind a manual flag.
      PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == true }}

    steps:
      - uses: actions/checkout@v4

      # Constrain buildkitd memory. Previous OOM (May 12 23:42) was caused
      # by buildkitd holding 27 GB RSS on a 31 GB-RAM host. Cap parallelism
      # so peak RSS stays under ~12 GB and the runner + dockerd + other
      # services keep their headroom.
      #
      # max-parallelism = 2 limits concurrent download stages from our 22
      # to 2 at a time. Total wall time impact ~10-30% slower since the
      # 1 Gbps NIC is the bottleneck not parallelism. hf-xet still does
      # range_gets within each stage so per-file bandwidth is saturated.
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2
              gc = true
              gckeepbytes = 21474836480

      - name: Log in to Docker Hub
        if: env.PUBLISH == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (cache only)
        if: env.PUBLISH != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.variant }}
          provenance: false
          sbom: false
          push: false
          secrets: |
            "hf_token=${{ secrets.HF_TOKEN }}"
          # Cache-only build. No image push, no tag update, no RunPod
          # rollover. Just warms the registry cache so the next publish
          # build is fast. Shared buildcache ref across both variants so
          # the common bake-common stage hits cache when the second
          # variant builds.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/comfyui-models:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/comfyui-models:buildcache,mode=min,compression=zstd

      - name: Build & push (Docker Hub + ghcr.io)
        if: env.PUBLISH == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.variant }}
          provenance: false
          sbom: false
          # Push to both registries so RunPod can pull from the faster one
          # (Docker Hub ~6x faster cold pull than ghcr.io from EU-RO-1).
          # SHA tag is variant-suffixed so both variants can coexist on
          # the same commit.
          tags: |
            docker.io/${{ vars.DOCKERHUB_REPO }}/${{ vars.DOCKERHUB_IMG }}:${{ matrix.tag }}
            docker.io/${{ vars.DOCKERHUB_REPO }}/${{ vars.DOCKERHUB_IMG }}:${{ github.sha }}-${{ matrix.variant }}
            ghcr.io/${{ github.repository_owner }}/comfyui-models:${{ matrix.tag }}
            ghcr.io/${{ github.repository_owner }}/comfyui-models:${{ github.sha }}-${{ matrix.variant }}
          secrets: |
            "hf_token=${{ secrets.HF_TOKEN }}"
          # zstd over gzip for the image layers:
          # - 20-50% smaller layers (better push throughput)
          # - Decompression ~60% faster than gzip on pull = RunPod cold
          #   start drops ~30% (per AWS Fargate benchmark)
          # - safetensors themselves barely compress with either algorithm;
          #   the real win is non-tensor layers (Python deps, ComfyUI src,
          #   base image)
          # - force-compression=true recompresses the gzip base-image
          #   layers to zstd so the final image is uniform
          # - BuildKit's zstd is pure-Go klauspost (not CGO), so build
          #   compression speed is marginal vs gzip; the win is push/pull
          outputs: type=image,push=true,compression=zstd,force-compression=true
          # Registry mode=max caches every intermediate stage so warm
          # rebuilds skip already-downloaded models. Separate :buildcache
          # ref keeps the cache manifest out of the published tags.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/comfyui-models:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/comfyui-models:buildcache,mode=min,compression=zstd

      - name: Image summary
        if: env.PUBLISH == 'true'
        run: |
          {
            echo "### ComfyUI baked-models image (${{ matrix.variant }}) published"
            echo '```'
            echo "Docker Hub: docker.io/${{ vars.DOCKERHUB_REPO }}/${{ vars.DOCKERHUB_IMG }}:${{ matrix.tag }}"
            echo "ghcr.io:    ghcr.io/${{ github.repository_owner }}/comfyui-models:${{ matrix.tag }}"
            echo '```'
            echo ""
            echo "Update RunPod template:"
            echo '```'
            echo "runpodctl template update <template-id> --image docker.io/${{ vars.DOCKERHUB_REPO }}/${{ vars.DOCKERHUB_IMG }}:${{ matrix.tag }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cache-only summary
        if: env.PUBLISH != 'true'
        run: |
          {
            echo "### ComfyUI baked-models cache warmed (${{ matrix.variant }})"
            echo "Cache ref: ghcr.io/${{ github.repository_owner }}/comfyui-models:buildcache"
            echo "No image push. To publish, run workflow_dispatch with publish=true."
          } >> "$GITHUB_STEP_SUMMARY"
