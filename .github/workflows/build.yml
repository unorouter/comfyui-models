name: Build slim comfyui-models image

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Push image to registries + tag :latest (RunPod workers will roll on next cold start). Default false = build only."
        type: boolean
        default: true
  push:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    # Image is small now (~5-10 GB; no baked models). GitHub-hosted runners
    # are plenty - the previous self-hosted runner was only needed for the
    # 34 GB Flux 2 unet layer.
    runs-on: ubuntu-latest

    env:
      PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == true || github.event_name == 'push' }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: env.PUBLISH == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (verify only)
        if: env.PUBLISH != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          provenance: false
          sbom: false
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/comfyui-models:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/comfyui-models:buildcache,mode=max,compression=zstd

      - name: Build & push (Docker Hub + ghcr.io)
        if: env.PUBLISH == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          provenance: false
          sbom: false
          # Docker Hub ~6x faster cold pull than ghcr.io from EU-RO-1; keep
          # both so RunPod can pick whichever responds faster.
          tags: |
            docker.io/${{ vars.DOCKERHUB_REPO }}/${{ vars.DOCKERHUB_IMG }}:latest
            docker.io/${{ vars.DOCKERHUB_REPO }}/${{ vars.DOCKERHUB_IMG }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/comfyui-models:latest
            ghcr.io/${{ github.repository_owner }}/comfyui-models:${{ github.sha }}
          # zstd compression: smaller layers, faster decompress on pull.
          outputs: type=image,push=true,compression=zstd,force-compression=true
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/comfyui-models:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/comfyui-models:buildcache,mode=max,compression=zstd

      - name: Image summary
        if: env.PUBLISH == 'true'
        run: |
          {
            echo "### comfyui-models image (published)"
            echo '```'
            echo "Docker Hub: docker.io/${{ vars.DOCKERHUB_REPO }}/${{ vars.DOCKERHUB_IMG }}:latest"
            echo "ghcr.io:    ghcr.io/${{ github.repository_owner }}/comfyui-models:latest"
            echo '```'
            echo ""
            echo "Update RunPod template:"
            echo '```'
            echo "runpodctl template update gcgakg920o --image docker.io/${{ vars.DOCKERHUB_REPO }}/${{ vars.DOCKERHUB_IMG }}:latest"
            echo '```'
            echo ""
            echo "Required env on the template:"
            echo "  R2_WORKER_URL    https://comfy-models-r2.<acct>.workers.dev"
            echo "  R2_WORKER_TOKEN  (matches the Cloudflare Worker AUTH_TOKEN secret)"
            echo "  PREFETCH_PARALLEL  optional, default 4"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify-only summary
        if: env.PUBLISH != 'true'
        run: |
          {
            echo "### comfyui-models build verified"
            echo "No push. To publish, dispatch with publish=true."
          } >> "$GITHUB_STEP_SUMMARY"
