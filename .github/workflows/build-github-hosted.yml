name: Build (GitHub-hosted, experimental)

# Experimental: see if a 14 GB stock GitHub runner can build the 80 GB
# image by aggressively clearing space + streaming per-layer to ghcr.io.
# Runs in parallel with the self-hosted build for comparison.

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: gh-hosted-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-hosted:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # Free up ~25 GB. Goes from ~14 GB free to ~30 GB free.
      - name: Clear runner space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/microsoft \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/.ghcup \
            /usr/share/swift /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean
          docker image prune -a -f || true
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (streaming, no local image cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          # Push only, never store the final image locally (no `--output type=docker`)
          tags: |
            ghcr.io/${{ github.repository_owner }}/comfyui-models:gh-hosted-latest
            ghcr.io/${{ github.repository_owner }}/comfyui-models:gh-hosted-${{ github.sha }}
          secrets: |
            hf_token=${{ secrets.HF_TOKEN }}
          # Cache layers in the registry so retries skip already-built steps
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/comfyui-models:gh-hosted-buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/comfyui-models:gh-hosted-buildcache,mode=max

      - name: Final disk state
        if: always()
        run: df -h /
