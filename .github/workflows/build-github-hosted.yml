name: Build (GitHub-hosted, experimental)

# Experimental: see if a stock GitHub runner (14 GB disk -> ~30 GB after
# clear-space) can build the 80 GB image by streaming push to registries.
# The Flux 2 unet layer alone is 34 GB and will likely fail. Runs in
# parallel with the self-hosted build for direct comparison.

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: build-gh-hosted-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-hosted:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # Free ~25 GB by removing unused toolchains.
      - name: Clear runner space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/microsoft \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/.ghcup \
            /usr/share/swift /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean
          docker image prune -a -f || true
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (streaming, dual-registry)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          # gh-hosted-* tags isolate this experimental output from the
          # self-hosted build's `:latest` tag.
          tags: |
            docker.io/${{ vars.DOCKERHUB_REPO }}/${{ vars.DOCKERHUB_IMG }}:gh-hosted-latest
            ghcr.io/${{ github.repository_owner }}/comfyui-models:gh-hosted-latest
          secrets: |
            "hf_token=${{ secrets.HF_TOKEN }}"
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/comfyui-models:gh-hosted-buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/comfyui-models:gh-hosted-buildcache,mode=max

      - name: Final disk state
        if: always()
        run: df -h /
